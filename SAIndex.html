<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Intel - Live Stats & Analysis</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏏</text></svg>">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🏏</span>
            <h1>Cricket Intel</h1>
        </div>
        <nav class="nav-tabs">
            <button class="tab-btn active" data-tab="search">Quick Analyze</button>
            <button class="tab-btn" data-tab="matches">Live Matches</button>
            <button class="tab-btn" data-tab="compare">Compare Players</button>
        </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- TAB 1: SEARCH / QUICK ANALYZE -->
        <section id="search" class="tab-content active">
            <div class="search-box">
                <h2>🔍 Quick Player Analysis</h2>
                <p>Enter player name to get live stats</p>
                <div class="search-input-container">
                    <input type="text" id="playerSearch" placeholder="e.g., Virat Kohli, Babar Azam, Joe Root" autocomplete="off">
                    <button id="analyzeBtn">Analyze</button>
                </div>
                <div class="quick-search">
                    <span>Popular:</span>
                    <button class="quick-btn" data-player="Virat Kohli">Virat Kohli</button>
                    <button class="quick-btn" data-player="Babar Azam">Babar Azam</button>
                    <button class="quick-btn" data-player="Joe Root">Joe Root</button>
                    <button class="quick-btn" data-player="Rohit Sharma">Rohit Sharma</button>
                    <button class="quick-btn" data-player="Steve Smith">Steve Smith</button>
                    <button class="quick-btn" data-player="Kane Williamson">Kane Williamson</button>
                </div>
            </div>
            <div id="playerResults" class="results-container"></div>
        </section>

        <!-- TAB 2: LIVE MATCHES -->
        <section id="matches" class="tab-content">
            <div class="section-header">
                <h2>📺 Live & Upcoming Matches</h2>
                <button id="refreshMatches" class="refresh-btn">🔄 Refresh</button>
            </div>
            <div id="matchResults" class="matches-grid"></div>
        </section>

        <!-- TAB 3: COMPARE PLAYERS -->
        <section id="compare" class="tab-content">
            <div class="compare-box">
                <h2>⚔️ Compare Players</h2>
                <p>Compare two players head to head</p>
                <div class="compare-inputs">
                    <div class="compare-input">
                        <label>Player 1</label>
                        <input type="text" id="player1Input" placeholder="e.g., Virat Kohli" autocomplete="off">
                    </div>
                    <span class="vs-text">VS</span>
                    <div class="compare-input">
                        <label>Player 2</label>
                        <input type="text" id="player2Input" placeholder="e.g., Babar Azam" autocomplete="off">
                    </div>
                </div>
                <button id="compareBtn">Compare Now</button>
            </div>
            <div id="compareResults" class="compare-results"></div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>🏏 Cricket Intel | Powered by <a href="https://cricketdata.org" target="_blank">CricketData API</a> | Built with ❤️ for Cricket Fans</p>
        <p style="font-size: 12px; margin-top: 8px; opacity: 0.6;">
            <a href="https://github.com/spartan13292-sudo/cricket-intel" target="_blank">GitHub</a> | 
            <a href="#" onclick="alert('Press F12 to open Developer Console for debug info')">Debug</a>
        </p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
